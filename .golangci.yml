version: "2"

linters:
  default: none
  enable:
    - loglint

  settings:
    custom:
      loglint:
        type: module
        description: "Logging linter"
        original-url: github.com/andreborch/log-linter
        settings:
          enabled_rules:
            - "language"
            - "specialchars"
            - "lowercase"
            - "sensitive"
          sensitive_bans: []
          spec_char_exceptions: ":"
          sens_exceptions: []
          logger_packages:
            - "log/slog"
            - "go.uber.org/zap"
          logger_funcs:
            - "Debug"
            - "Info"
            - "Warn"
            - "Error"
            - "Log"
          lang: "en"
            